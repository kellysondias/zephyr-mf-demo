name: Deploy to Zephyr Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-remote:
    name: Deploy Remote App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/remote/package-lock.json

      - name: Install dependencies
        working-directory: apps/remote
        run: npm install

      - name: Build & Deploy
        working-directory: apps/remote
        run: npm run build
        env:
          ZEPHYR_TOKEN: ${{ secrets.ZEPHYR_TOKEN }}

  deploy-host:
    name: Deploy Host App
    runs-on: ubuntu-latest
    needs: deploy-remote
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/host/package-lock.json

      - name: Install dependencies
        working-directory: apps/host
        run: npm install

      - name: Build & Deploy
        working-directory: apps/host
        run: npm run build
        env:
          ZEPHYR_TOKEN: ${{ secrets.ZEPHYR_TOKEN }}